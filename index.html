<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Adventures | 3D Lofi Ecosystems</title>
    <meta name="description" content="Immerse yourself in procedurally generated 3D visual and sound environments designed for deep work, focus, and relaxation.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Fullscreen Background -->
    <div class="bg-container">
        <img src="bg.png" alt="Mini Adventures Island" class="bg-image">
        <div class="bg-overlay"></div>
    </div>

    <!-- Entrance Overlay (For Autoplay Bypass) -->
    <div id="entrance-overlay" class="entrance-overlay">
        <div class="entrance-content">
            <i class="fa-solid fa-headphones-simple entrance-icon"></i>
            <h1>Welcome to the Island</h1>
            <p>Put your headphones on.</p>
            <button id="enter-btn" class="magic-btn">Enter & Play Radio</button>
        </div>
    </div>

    <!-- Main Content -->
    <main id="main-content" class="hidden">
        <div class="glass-card">
            <!-- Header -->
            <header class="profile-header">
                <div class="avatar-container">
                    <img src="bg.png" alt="Avatar" class="avatar">
                    <div class="pulse-ring"></div>
                </div>
                <h2>Mini Adventures</h2>
                <p class="bio">Deep focus 3D Lofi ecosystems 🏝️✨</p>
            </header>

            <!-- YouTube Radio Embedded -->
            <div class="video-wrapper">
                <div id="youtube-player"></div>
            </div>

            <!-- Links -->
            <div class="links-container">
                <a href="https://youtube.com/@channelminiadventure" target="_blank" class="link-btn yt-btn">
                    <i class="fa-brands fa-youtube"></i> YouTube
                </a>
                <a href="https://tiktok.com/@channelminiadventure" target="_blank" class="link-btn tiktok-btn">
                    <i class="fa-brands fa-tiktok"></i> TikTok
                </a>
                <a href="https://instagram.com/channelminiadventure" target="_blank" class="link-btn ig-btn">
                    <i class="fa-brands fa-instagram"></i> Instagram
                </a>
                <a href="https://pinterest.com/channelminiadventure" target="_blank" class="link-btn pin-btn">
                    <i class="fa-brands fa-pinterest"></i> Pinterest
                </a>
                <a href="https://open.spotify.com/artist/channelminiadventure" target="_blank" class="link-btn spot-btn">
                    <i class="fa-brands fa-spotify"></i> Spotify
                </a>
                
                <!-- Ko-fi Donate -->
                <a href="https://ko-fi.com/channelminiadventure" target="_blank" class="kofi-btn">
                    <i class="fa-solid fa-mug-hot"></i> Buy me a coffee
                </a>
            </div>
            
            <footer>
                <p>© 2026 Mini Adventures. All rights reserved.</p>
            </footer>
        </div>
    </main>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
